<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthEdge Funding - Prop Firm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js">
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow-y: auto;
            background: #0b1120;
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(56, 189, 248, 0.15);
        }
        
        .glass-light {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }
        
        .ticker {
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            overflow: hidden;
            height: 36px;
            display: flex;
            align-items: center;
        }
        
        @keyframes slide {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        
        .ticker-scroll {
            display: flex;
            white-space: nowrap;
            animation: slide 25s linear infinite;
            width: fit-content;
        }
        .ticker-scroll:hover { animation-play-state: paused; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-dot { animation: pulse 2s infinite; }
        
        input {
            background: #1a2332 !important;
            color: #ffffff !important;
            border: 1px solid rgba(56, 189, 248, 0.3) !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            width: 100% !important;
            font-size: 16px !important;
            transition: all 0.3s ease !important;
        }
        input::placeholder { color: #9ca3af !important; opacity: 1 !important; }
        input:focus {
            border-color: #22d3ee !important;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2) !important;
            outline: none !important;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            z-index: 10;
        }
        .password-toggle:hover { color: #22d3ee; }
        .password-wrapper { position: relative; width: 100%; }
        
        #page-content { min-height: 80vh; padding-bottom: 40px; }
        
        .custom-checkbox { accent-color: #22d3ee; width: 16px; height: 16px; cursor: pointer; }
        .number-update { transition: all 0.3s ease; }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }
        
        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.08);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-card .stat-value { font-size: 20px; font-weight: bold; color: white; }
        .stat-card .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .trade-btn-buy {
            background: #22c55e;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .trade-btn-buy:hover { background: #16a34a; transform: scale(1.02); }
        .trade-btn-sell {
            background: #ef4444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .trade-btn-sell:hover { background: #dc2626; transform: scale(1.02); }
        
        .position-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        
        #chart-container {
            width: 100%;
            height: 400px;
            background: #0b1120;
            border-radius: 12px;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            #nav-links { flex-wrap: wrap; justify-content: center; gap: 4px; }
            #nav-links a { font-size: 12px; padding: 4px 8px; }
            #chart-container { height: 250px; }
        }
    </style>
</head>
<body>

    <nav class="glass border-b border-cyan/20 px-4 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-wave-square text-cyan-400 text-2xl"></i>
                <span class="text-white font-bold text-xl">SynthEdge <span class="text-cyan-400">Funding</span></span>
            </div>
            <div class="flex items-center space-x-4 text-sm md:text-base" id="nav-links">
                <a href="javascript:void(0)" onclick="navigate('home')" class="text-gray-300 hover:text-cyan-400 transition px-2 py-1">Home</a>
                <a href="javascript:void(0)" onclick="navigate('dashboard')" class="text-gray-300 hover:text-cyan-400 transition px-2 py-1">Dashboard</a>
                <a href="javascript:void(0)" onclick="navigate('trading')" class="text-cyan-400 font-bold transition px-2 py-1">Trading</a>
                <a href="javascript:void(0)" onclick="navigate('challenges')" class="text-gray-300 hover:text-cyan-400 transition px-2 py-1">Challenges</a>
                <a href="javascript:void(0)" onclick="navigate('payouts')" class="text-gray-300 hover:text-cyan-400 transition px-2 py-1">Payouts</a>
                <a href="javascript:void(0)" onclick="navigate('leaderboard')" class="text-gray-300 hover:text-cyan-400 transition px-2 py-1">Leaderboard</a>
                <a href="javascript:void(0)" onclick="navigate('journal')" class="text-gray-300 hover:text-cyan-400 transition px-2 py-1">Journal</a>
                <span id="nav-auth"></span>
            </div>
        </div>
    </nav>

    <div class="ticker py-1.5 px-4 overflow-hidden whitespace-nowrap text-xs text-gray-400">
        <div class="ticker-scroll" id="tickerContent"></div>
    </div>

    <main id="page-content" class="max-w-7xl mx-auto px-4 py-6"></main>

    <footer class="glass border-t border-cyan/10 mt-8 py-6 px-4 text-center text-gray-400 text-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-4">
                <i class="fas fa-phone-alt text-cyan-400"></i><span>0741 748 180</span>
                <i class="fas fa-map-pin text-cyan-400 ml-2"></i><span>Nairobi, Kenya</span>
            </div>
            <div class="flex space-x-6 mt-2 md:mt-0">
                <span class="text-cyan-300">© 2026 SynthEdge Funding</span>
            </div>
        </div>
    </footer>

    <script>
        // ============ CONFIGURATION ============
        const API_URL = 'https://synthedge-backend.onrender.com/api';
        let currentUser = null;
        let token = null;
        let tradingInterval = null;
        let chart = null;
        let candlestickSeries = null;
        let chartData = [];

        let accountData = {
            balance: 10000,
            equity: 10000,
            drawdown: 0,
            profit: 0,
            peakEquity: 10000,
            totalTrades: 0,
            winningTrades: 0,
            totalPayouts: 0,
            positions: [],
            tradeHistory: []
        };

        console.log('🚀 SynthEdge Loading...');

        // ============ API HELPERS ============
        async function apiCall(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            try {
                const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'API Error');
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // ============ AUTH FUNCTIONS ============
        async function loginUser(username, password) {
            try {
                const data = await apiCall('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
                updateUI();
                navigate('dashboard');
                return true;
            } catch (error) {
                alert('❌ Login failed: ' + error.message);
                return false;
            }
        }

        async function registerUser(username, email, password) {
            try {
                await apiCall('/register', { method: 'POST', body: JSON.stringify({ username, email, password }) });
                alert('✅ Registration successful! Please login.');
                navigate('login');
                return true;
            } catch (error) {
                alert('❌ Registration failed: ' + error.message);
                return false;
            }
        }

        function logoutUser() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            if (tradingInterval) { clearInterval(tradingInterval);
                tradingInterval = null; }
            updateUI();
            navigate('home');
        }

        function checkAuth() {
            const savedToken = localStorage.getItem('token');
            const savedUser = localStorage.getItem('user');
            if (savedToken && savedUser) {
                token = savedToken;
                currentUser = JSON.parse(savedUser);
                updateUI();
                return true;
            }
            return false;
        }

        function updateUI() {
            const authNav = document.getElementById('nav-auth');
            if (currentUser) {
                authNav.innerHTML = `
                    <span class="text-cyan-300 text-sm"><i class="fas fa-user-circle"></i> ${currentUser.username}</span>
                    <button onclick="logoutUser()" class="text-red-400/70 hover:text-red-300 text-sm border border-red-500/30 px-2 py-0.5 rounded-full">Logout</button>
                `;
            } else {
                authNav.innerHTML = `
                    <a href="javascript:void(0)" onclick="navigate('login')" class="bg-cyan-600/20 text-cyan-300 px-3 py-1 rounded-full border border-cyan-500/30 text-sm hover:bg-cyan-600/40 transition">Login</a>
                    <a href="javascript:void(0)" onclick="navigate('register')" class="bg-blue-600/30 text-blue-300 px-3 py-1 rounded-full border border-blue-500/30 text-sm hover:bg-blue-600/40 transition">Register</a>
                `;
            }
        }

        // ============ MARKET DATA ============
        const marketData = [
            { pair: 'EUR/USD', price: 1.0874, change: 0.02 },
            { pair: 'GBP/JPY', price: 189.22, change: -0.15 },
            { pair: 'BTC/USD', price: 67852, change: 1.2 },
            { pair: 'ETH/USD', price: 3521, change: 0.8 },
            { pair: 'SPX', price: 5234.1, change: -0.3 },
            { pair: 'SYNTH', price: 1245.8, change: 2.5 }
        ];

        let currentPrice = 1.0874;

        function generateCandleData(count = 100) {
            const data = [];
            let price = currentPrice;
            const now = new Date();
            
            for (let i = count; i > 0; i--) {
                const time = new Date(now.getTime() - i * 3000);
                const open = price;
                const change = (Math.random() - 0.5) * 0.002;
                const close = parseFloat((price + change).toFixed(4));
                const high = Math.max(open, close) + (Math.random() * 0.001);
                const low = Math.min(open, close) - (Math.random() * 0.001);
                
                data.push({
                    time: Math.floor(time.getTime() / 1000),
                    open: open,
                    high: high,
                    low: low,
                    close: close
                });
                price = close;
            }
            currentPrice = price;
            return data;
        }

        function updateChart() {
            if (!chart || !candlestickSeries) return;
            
            const newCandle = {
                time: Math.floor(Date.now() / 1000),
                open: currentPrice,
                high: currentPrice + (Math.random() * 0.001),
                low: currentPrice - (Math.random() * 0.001),
                close: currentPrice + (Math.random() - 0.5) * 0.002
            };
            newCandle.high = Math.max(newCandle.open, newCandle.close, newCandle.high);
            newCandle.low = Math.min(newCandle.open, newCandle.close, newCandle.low);
            newCandle.close = parseFloat(newCandle.close.toFixed(4));
            newCandle.open = parseFloat(newCandle.open.toFixed(4));
            
            chartData.push(newCandle);
            if (chartData.length > 200) chartData.shift();
            candlestickSeries.setData(chartData);
        }

        // ============ TRADING SIMULATION ============
        function updateTradingAccount() {
            const marketMove = (Math.random() - 0.5) * 2.5;
            currentPrice = currentPrice * (1 + marketMove / 10000);
            currentPrice = parseFloat(currentPrice.toFixed(4));
            
            // Update open positions
            accountData.positions.forEach(pos => {
                const priceDiff = pos.type === 'buy' ? currentPrice - pos.entry : pos.entry - currentPrice;
                pos.profit = parseFloat((priceDiff * pos.amount * 1000).toFixed(2));
                pos.currentPrice = currentPrice;
            });
            
            const totalPositionsProfit = accountData.positions.reduce((sum, p) => sum + p.profit, 0);
            
            accountData.equity = parseFloat((accountData.balance + totalPositionsProfit).toFixed(2));
            accountData.profit = parseFloat((accountData.equity - accountData.balance).toFixed(2));
            
            if (accountData.equity > accountData.peakEquity) {
                accountData.peakEquity = accountData.equity;
            }
            accountData.drawdown = accountData.peakEquity > 0 ?
                parseFloat(((accountData.peakEquity - accountData.equity) / accountData.peakEquity * 100).toFixed(2)) : 0;
            
            // Auto-payout at 8%
            const profitTarget = accountData.balance * 0.08;
            if (accountData.profit >= profitTarget && accountData.balance > 0) {
                const payoutAmount = Math.round(accountData.profit * 0.8);
                if (payoutAmount > 0) {
                    autoPayout(payoutAmount);
                    accountData.balance = accountData.balance + (accountData.profit * 0.2);
                    accountData.profit = 0;
                    accountData.equity = accountData.balance;
                    accountData.peakEquity = accountData.balance;
                }
            }
            
            updateDashboardDisplay();
            updateChart();
            saveAccountData();
        }

        async function autoPayout(amount) {
            try {
                await apiCall('/payouts', {
                    method: 'POST',
                    body: JSON.stringify({ amount, date: new Date().toISOString().split('T')[0], status: 'Completed' })
                });
                accountData.totalPayouts += amount;
                showNotification(`🎉 Payout of $${amount.toLocaleString()} processed!`);
            } catch (error) { console.error('Payout error:', error); }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed top-20 right-4 glass p-4 rounded-xl border border-cyan-500/30 z-50 max-w-sm';
            notification.innerHTML = `
                <div class="flex items-center space-x-3">
                    <i class="fas fa-bell text-cyan-400 text-xl"></i>
                    <span class="text-white text-sm">${message}</span>
                </div>
            `;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s';
                setTimeout(() => notification.remove(), 500);
            }, 5000);
        }

        function updateDashboardDisplay() {
            const balanceEl = document.getElementById('dashboardBalance');
            const equityEl = document.getElementById('dashboardEquity');
            const drawdownEl = document.getElementById('dashboardDrawdown');
            const profitEl = document.getElementById('dashboardProfit');
            const profitTargetEl = document.getElementById('profitTargetProgress');
            const winRateEl = document.getElementById('winRate');
            const positionsEl = document.getElementById('openPositions');
            
            if (balanceEl) balanceEl.textContent = `$${accountData.balance.toLocaleString()}`;
            if (equityEl) {
                equityEl.textContent = `$${accountData.equity.toLocaleString()}`;
                const color = accountData.equity >= accountData.balance ? 'text-green-400' : 'text-red-400';
                equityEl.className = `text-2xl font-bold ${color} number-update`;
            }
            if (drawdownEl) {
                drawdownEl.textContent = `${accountData.drawdown}%`;
                const color = accountData.drawdown > 5 ? 'text-red-400' : 'text-cyan-400';
                drawdownEl.className = `text-2xl font-bold ${color} number-update`;
            }
            if (profitEl) {
                profitEl.textContent = `$${accountData.profit.toLocaleString()}`;
                const color = accountData.profit >= 0 ? 'text-green-400' : 'text-red-400';
                profitEl.className = `text-2xl font-bold ${color} number-update`;
            }
            
            if (profitTargetEl) {
                const target = accountData.balance * 0.08;
                const progress = Math.min((accountData.profit / target) * 100, 100);
                profitTargetEl.style.width = `${progress}%`;
                profitTargetEl.textContent = `${Math.round(progress)}%`;
            }
            
            if (winRateEl) {
                const winRate = accountData.totalTrades > 0 ?
                    Math.round((accountData.winningTrades / accountData.totalTrades) * 100) : 0;
                winRateEl.textContent = `${winRate}%`;
            }
            
            if (positionsEl) {
                if (accountData.positions.length === 0) {
                    positionsEl.innerHTML = '<div class="text-gray-500 text-sm py-2">No open positions</div>';
                } else {
                    positionsEl.innerHTML = accountData.positions.map(p => `
                        <div class="position-row">
                            <span class="${p.type === 'buy' ? 'text-green-400' : 'text-red-400'}">${p.type.toUpperCase()}</span>
                            <span>$${p.amount}</span>
                            <span>${p.entry}</span>
                            <span class="${p.profit >= 0 ? 'text-green-400' : 'text-red-400'}">$${p.profit.toFixed(2)}</span>
                            <button onclick="closePosition('${p.id}')" class="text-red-400 hover:text-red-300 text-xs">Close</button>
                        </div>
                    `).join('');
                }
            }
        }

        async function saveAccountData() {
            try {
                await apiCall('/balance', {
                    method: 'PUT',
                    body: JSON.stringify({
                        balance: accountData.balance,
                        equity: accountData.equity,
                        drawdown: accountData.drawdown,
                        profit: accountData.profit
                    })
                });
            } catch (error) {}
        }

        // ============ TRADING FUNCTIONS ============
        function placeTrade(type) {
            if (!currentUser) {
                alert('Please login first');
                return;
            }
            
            const amount = parseFloat(document.getElementById('tradeAmount')?.value || 100);
            if (amount <= 0 || amount > accountData.balance) {
                alert('Invalid trade amount');
                return;
            }
            
            const trade = {
                id: Date.now().toString(),
                type: type,
                amount: amount,
                entry: currentPrice,
                profit: 0,
                currentPrice: currentPrice,
                timestamp: new Date().toISOString()
            };
            
            accountData.positions.push(trade);
            accountData.totalTrades++;
            showNotification(`📊 ${type.toUpperCase()} ${amount} @ ${currentPrice}`);
            updateDashboardDisplay();
            saveAccountData();
        }

        async function closePosition(id) {
            const pos = accountData.positions.find(p => p.id === id);
            if (!pos) return;
            
            const profit = pos.profit;
            accountData.balance = parseFloat((accountData.balance + profit).toFixed(2));
            accountData.equity = accountData.balance;
            accountData.profit = parseFloat((accountData.equity - accountData.balance).toFixed(2));
            if (profit > 0) accountData.winningTrades++;
            
            // Save to trade history
            accountData.tradeHistory.push({
                ...pos,
                closePrice: currentPrice,
                profit: profit,
                closedAt: new Date().toISOString()
            });
            
            accountData.positions = accountData.positions.filter(p => p.id !== id);
            showNotification(`✅ Position closed! ${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}`);
            updateDashboardDisplay();
            saveAccountData();
        }

        function renderTicker() {
            const tickerContainer = document.getElementById('tickerContent');
            if (!tickerContainer) return;
            let html = '';
            for (let r = 0; r < 3; r++) {
                marketData.forEach(item => {
                    const direction = item.change >= 0 ? 'up' : 'down';
                    const color = direction === 'up' ? 'text-green-400' : 'text-red-400';
                    const icon = direction === 'up' ? 'fa-arrow-up' : 'fa-arrow-down';
                    html += `
                        <span class="mx-4" data-pair="${item.pair}">
                            <span class="${color}">${item.pair}</span>
                            ${item.price.toLocaleString()} 
                            <i class="fas ${icon} ${color} ml-1"></i>
                        </span>
                    `;
                });
            }
            tickerContainer.innerHTML = html;
        }

        // ============ PAGE RENDERERS ============
        async function renderHome() {
            return `
                <div class="grid md:grid-cols-2 gap-8 items-center">
                    <div>
                        <h1 class="text-4xl md:text-6xl font-extrabold text-white leading-tight">Trade with <span class="text-cyan-400">SynthEdge</span></h1>
                        <p class="text-gray-300 text-lg mt-4">Proprietary trading funding up to $100,000. Zero risk, real simulation.</p>
                        <div class="flex flex-wrap gap-4 mt-6">
                            <a href="javascript:void(0)" onclick="navigate('trading')" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-cyan-600/30">Start Trading</a>
                            <a href="javascript:void(0)" onclick="navigate('challenges')" class="glass-light text-cyan-300 border border-cyan-500/30 px-6 py-3 rounded-xl hover:bg-cyan-900/20">View Challenges</a>
                        </div>
                        <div class="mt-8 grid grid-cols-4 gap-2 text-center">
                            <div class="glass p-2 rounded-lg"><span class="text-cyan-400 text-sm">$10k</span></div>
                            <div class="glass p-2 rounded-lg"><span class="text-cyan-400 text-sm">$25k</span></div>
                            <div class="glass p-2 rounded-lg"><span class="text-cyan-400 text-sm">$50k</span></div>
                            <div class="glass p-2 rounded-lg"><span class="text-cyan-400 text-sm">$100k</span></div>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <h2 class="text-xl font-bold text-white">📊 Live Market</h2>
                        <div class="grid grid-cols-2 gap-3 text-gray-300 mt-4">
                            <div class="bg-navy/60 p-3 rounded-lg home-market-item" data-home-pair="BTC"><span class="text-green-400">BTC</span> 67,852 <i class="fas fa-arrow-up text-green-400"></i></div>
                            <div class="bg-navy/60 p-3 rounded-lg home-market-item" data-home-pair="ETH"><span class="text-green-400">ETH</span> 3,521 <i class="fas fa-arrow-up text-green-400"></i></div>
                            <div class="bg-navy/60 p-3 rounded-lg home-market-item" data-home-pair="SPX"><span class="text-red-400">SPX</span> 5,234 <i class="fas fa-arrow-down text-red-400"></i></div>
                            <div class="bg-navy/60 p-3 rounded-lg home-market-item" data-home-pair="SYNTH"><span class="text-cyan-400">SYNTH</span> 1,245 <i class="fas fa-arrow-up text-cyan-400"></i></div>
                        </div>
                        ${currentUser ? `<div class="bg-cyan-900/20 p-3 rounded-lg text-cyan-300 text-sm mt-4">👋 Welcome back, ${currentUser.username}</div>` : '<div class="bg-cyan-900/20 p-3 rounded-lg text-cyan-300 text-sm mt-4">🔐 Login to start trading</div>'}
                    </div>
                </div>
            `;
        }

        function initChart() {

                layout: {

                    textColor: '#6b7280',
                },
                grid: {
                    vertLines: { color: '#1a2332' },
                    horzLines: { color: '#1a2332' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#1a2332',
                },
                timeScale: {
                    borderColor: '#1a2332',
                    timeVisible: true,
                    secondsVisible: true,
                },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#22c55e',
                downColor: '#ef4444',
                borderVisible: false,
                wickUpColor: '#22c55e',
                wickDownColor: '#ef4444',
            });

            candlestickSeries.setData(chartData);
            chart.timeScale().fitContent();
            
            // Handle resize
            window.addEventListener('resize', () => {
                if (chart) {
                    chart.resize(container.clientWidth, 400);
                }
            });
        }

                case 'register': content.innerHTML = renderRegister(); break;

        function updateHomeMarket() {
            const homeItems = document.querySelectorAll('.home-market-item');
            homeItems.forEach(item => {
                const pair = item.getAttribute('data-home-pair');
                const data = marketData.find(d => {
                    if (pair === 'BTC') return d.pair === 'BTC/USD';
                    if (pair === 'ETH') return d.pair === 'ETH/USD';
                    return d.pair === pair;
                });
                if (data) {
                    const direction = data.change >= 0 ? 'up' : 'down';
                    const color = direction === 'up' ? 'text-green-400' : 'text-red-400';
                    const icon = direction === 'up' ? 'fa-arrow-up' : 'fa-arrow-down';
                    item.innerHTML = `
                        <span class="${color}">${pair}</span>
                        ${data.price.toLocaleString()} 
                        <i class="fas ${icon} ${color}"></i>
                    `;
                }
            });
        }

                registerForm.removeEventListener('submit', handleRegister);

            const username = document.getElementById('loginUser').value;

            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                alert('Please fill in all fields');

            if (rememberMe) {
                localStorage.setItem('savedUsername', username);
                localStorage.setItem('rememberMe', 'true');

                localStorage.removeItem('savedUsername');
                localStorage.setItem('rememberMe', 'false');
            }
            
            await loginUser(username, password);

                accountData.positions = [];
                accountData.tradeHistory = [];
                showNotification(`🚀 Challenge $${parseInt(amount).toLocaleString()} started!`);
                alert(result.message);
                navigate('dashboard');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.addJournalEntry = async function() {
            if (!currentUser) {
                alert('Please login first');
                return;
            }
            try {
                const entry = prompt('Enter journal entry:');
                if (entry) {
                    await apiCall('/journal', {
                        method: 'POST',
                        body: JSON.stringify({ entry, outcome: 'pending' })
                    });
                    navigate('journal');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        // Make functions global
        window.navigate = navigate;
        window.logoutUser = logoutUser;
        window.togglePassword = togglePassword;
        window.toggleRegisterPassword = toggleRegisterPassword;
        window.placeTrade = placeTrade;
        window.closePosition = closePosition;

        // ============ INIT ============
        console.log('SynthEdge Loading...');
        checkAuth();
        navigate('home');
        console.log('SynthEdge Ready!');
        
        renderTicker();
        
        setInterval(() => {
            updateHomeMarket();
            // Update ticker prices
            const tickerItems = document.querySelectorAll('[data-pair]');
            tickerItems.forEach(el => {
                const pair = el.getAttribute('data-pair');
                const data = marketData.find(d => d.pair === pair);
                if (data) {
                    const direction = data.change >= 0 ? 'up' : 'down';
                    const color = direction === 'up' ? 'text-green-400' : 'text-red-400';
                    const icon = direction === 'up' ? 'fa-arrow-up' : 'fa-arrow-down';
                    el.innerHTML = `
                        <span class="${color}">${data.pair}</span>
                        ${data.price.toLocaleString()} 
                        <i class="fas ${icon} ${color} ml-1"></i>
                    `;
                }
            });
        }, 3000);
    </script>
</body>
</html>
