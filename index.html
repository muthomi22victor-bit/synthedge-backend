<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SynthEdge Funding - Prop Firm</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow-y: auto;
            background: #0b1120;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(56, 189, 248, 0.15);
        }

        .glass-light {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .ticker {
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            overflow: hidden;
            height: 36px;
            display: flex;
            align-items: center;
        }

        @keyframes slide {
            0% {
                transform: translateX(0%);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .ticker-scroll {
            display: flex;
            white-space: nowrap;
            animation: slide 25s linear infinite;
            width: fit-content;
        }
        .ticker-scroll:hover {
            animation-play-state: paused;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }

        @keyframes slideIn {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .notification-slide {
            animation: slideIn 0.5s ease-out;
        }

        input {
            background: #1a2332 !important;
            color: #ffffff !important;
            border: 1px solid rgba(56, 189, 248, 0.3) !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            width: 100% !important;
            font-size: 16px !important;
            transition: all 0.3s ease !important;
        }
        input::placeholder {
            color: #9ca3af !important;
            opacity: 1 !important;
        }
        input:focus {
            border-color: #22d3ee !important;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2) !important;
            outline: none !important;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            z-index: 10;
        }
        .password-toggle:hover {
            color: #22d3ee;
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        #page-content {
            min-height: 80vh;
            padding-bottom: 40px;
        }

        .custom-checkbox {
            accent-color: #22d3ee;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .number-update {
            transition: all 0.3s ease;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.08);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        .stat-card .stat-label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trade-btn-buy {
            background: #22c55e;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-size: 16px;
        }
        .trade-btn-buy:hover {
            background: #16a34a;
            transform: scale(1.02);
        }
        .trade-btn-sell {
            background: #ef4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-size: 16px;
        }
        .trade-btn-sell:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        .position-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            flex-wrap: wrap;
            gap: 4px;
        }

        #chart-container {
            width: 100%;
            height: 350px;
            background: #0b1120;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Payout Styles */
        .payout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 8px;
        }
        .payout-badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .payout-badge.completed {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .payout-badge.pending {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        .payout-badge.failed {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Notification Dot */
        .notification-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @media (max-width: 768px) {
            #nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 4px;
            }
            #nav-links a {
                font-size: 11px;
                padding: 4px 8px;
            }
            #chart-container {
                height: 220px;
            }
            .stat-card .stat-value {
                font-size: 15px;
            }
            .stat-card .stat-label {
                font-size: 9px;
            }
            .trade-btn-buy,
            .trade-btn-sell {
                font-size: 14px;
                padding: 10px;
            }
            .position-row {
                font-size: 12px;
            }
            .ticker-scroll {
                font-size: 10px;
            }
            .text-lg {
                font-size: 1rem !important;
            }
            .text-2xl {
                font-size: 1.25rem !important;
            }
            .glass.p-4 {
                padding: 12px !important;
            }
            .glass.p-6 {
                padding: 16px !important;
            }
            #page-content {
                padding-left: 12px;
                padding-right: 12px;
            }
            .grid-cols-4 {
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
            }
            .grid-cols-4 .glass {
                padding: 6px;
            }
            .grid-cols-4 .text-sm {
                font-size: 10px;
            }
            .payout-item {
                flex-wrap: wrap;
                gap: 4px;
            }
        }

        @media (max-width: 480px) {
            #chart-container {
                height: 180px;
            }
            .stat-card {
                padding: 8px;
            }
            .stat-card .stat-value {
                font-size: 13px;
            }
            .stat-card .stat-label {
                font-size: 8px;
            }
            .position-row {
                font-size: 11px;
            }
            #nav-links a {
                font-size: 10px;
                padding: 2px 6px;
            }
        }

        body {
            overflow-x: hidden;
            max-width: 100vw;
        }
        #page-content {
            overflow-x: hidden;
            max-width: 100%;
        }
        .max-w-7xl {
            max-width: 100%;
        }
    </style>
</head>
<body>

    <nav class="glass border-b border-cyan/20 px-3 py-2 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-wave-square text-cyan-400 text-xl md:text-2xl"></i>
                <span class="text-white font-bold text-base md:text-xl">SynthEdge <span class="text-cyan-400">Funding</span></span>
            </div>
            <div class="flex items-center space-x-2 md:space-x-4 text-xs md:text-sm" id="nav-links">
                <a href="javascript:void(0)" onclick="navigate('home')" class="text-gray-300 hover:text-cyan-400 transition px-1 md:px-2 py-1">Home</a>
                <a href="javascript:void(0)" onclick="navigate('dashboard')" class="text-gray-300 hover:text-cyan-400 transition px-1 md:px-2 py-1">Dashboard</a>
                <a href="javascript:void(0)" onclick="navigate('trading')" class="text-cyan-400 font-bold transition px-1 md:px-2 py-1">Trading</a>
                <a href="javascript:void(0)" onclick="navigate('challenges')" class="text-gray-300 hover:text-cyan-400 transition px-1 md:px-2 py-1">Challenges</a>
                <a href="javascript:void(0)" onclick="navigate('payouts')" class="text-gray-300 hover:text-cyan-400 transition px-1 md:px-2 py-1">Payouts</a>
                <a href="javascript:void(0)" onclick="navigate('leaderboard')" class="text-gray-300 hover:text-cyan-400 transition px-1 md:px-2 py-1">Leaderboard</a>
                <a href="javascript:void(0)" onclick="navigate('journal')" class="text-gray-300 hover:text-cyan-400 transition px-1 md:px-2 py-1">Journal</a>
                <span id="nav-auth"></span>
            </div>
        </div>
    </nav>

    <div class="ticker py-1 px-2 md:px-4 overflow-hidden whitespace-nowrap text-xs text-gray-400">
        <div class="ticker-scroll" id="tickerContent"></div>
    </div>

    <main id="page-content" class="max-w-7xl mx-auto px-3 md:px-4 py-4 md:py-6"></main>

    <footer class="glass border-t border-cyan/10 mt-8 py-4 md:py-6 px-3 md:px-4 text-center text-gray-400 text-xs md:text-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
            <div class="flex items-center space-x-4 flex-wrap justify-center">
                <i class="fas fa-phone-alt text-cyan-400"></i><span>0741 748 180</span>
                <i class="fas fa-map-pin text-cyan-400 ml-2"></i><span>Nairobi, Kenya</span>
            </div>
            <div class="flex space-x-6">
                <span class="text-cyan-300">© 2026 SynthEdge Funding</span>
            </div>
        </div>
    </footer>

    <script>
        // ============ CONFIGURATION ============
        const API_URL = 'https://synthedge-backend.onrender.com/api';
        let currentUser = null;
        let token = null;
        let tradingInterval = null;
        let chart = null;
        let candlestickSeries = null;
        let chartData = [];
        let lastCandleTime = 0;
        let payoutNotifications = [];

        let accountData = {
            balance: 10000,
            equity: 10000,
            drawdown: 0,
            profit: 0,
            peakEquity: 10000,
            totalTrades: 0,
            winningTrades: 0,
            totalPayouts: 0,
            positions: [],
            tradeHistory: []
        };

        console.log('🚀 SynthEdge Loading...');

        // ============ API HELPERS ============
        async function apiCall(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            try {
                const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'API Error');
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // ============ AUTH FUNCTIONS ============
        async function loginUser(username, password) {
            try {
                const data = await apiCall('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
                updateUI();
                navigate('dashboard');
                return true;
            } catch (error) {
                alert('❌ Login failed: ' + error.message);
                return false;
            }
        }

        async function registerUser(username, email, password) {
            try {
                await apiCall('/register', { method: 'POST', body: JSON.stringify({ username, email, password }) });
                alert('✅ Registration successful! Please login.');
                navigate('login');
                return true;
            } catch (error) {
                alert('❌ Registration failed: ' + error.message);
                return false;
            }
        }

        function logoutUser() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            if (tradingInterval) { clearInterval(tradingInterval);
                tradingInterval = null; }
            updateUI();
            navigate('home');
        }

        function checkAuth() {
            const savedToken = localStorage.getItem('token');
            const savedUser = localStorage.getItem('user');
            if (savedToken && savedUser) {
                token = savedToken;
                currentUser = JSON.parse(savedUser);
                updateUI();
                return true;
            }
            return false;
        }

        function updateUI() {
            const authNav = document.getElementById('nav-auth');
            if (currentUser) {
                authNav.innerHTML = `
                        <span class="text-cyan-300 text-xs md:text-sm"><i class="fas fa-user-circle"></i> ${currentUser.username}</span>
                        <button onclick="logoutUser()" class="text-red-400/70 hover:text-red-300 text-xs border border-red-500/30 px-2 py-0.5 rounded-full">Logout</button>
                    `;
            } else {
                authNav.innerHTML = `
                        <a href="javascript:void(0)" onclick="navigate('login')" class="bg-cyan-600/20 text-cyan-300 px-2 md:px-3 py-1 rounded-full border border-cyan-500/30 text-xs hover:bg-cyan-600/40 transition">Login</a>
                        <a href="javascript:void(0)" onclick="navigate('register')" class="bg-blue-600/30 text-blue-300 px-2 md:px-3 py-1 rounded-full border border-blue-500/30 text-xs hover:bg-blue-600/40 transition">Register</a>
                    `;
            }
        }

        // ============ MARKET DATA ============
        const marketData = [
            { pair: 'EUR/USD', price: 1.0874, change: 0.02 },
            { pair: 'GBP/JPY', price: 189.22, change: -0.15 },
            { pair: 'BTC/USD', price: 67852, change: 1.2 },
            { pair: 'ETH/USD', price: 3521, change: 0.8 },
            { pair: 'SPX', price: 5234.1, change: -0.3 },
            { pair: 'SYNTH', price: 1245.8, change: 2.5 }
        ];

        let currentPrice = 1.0874;

        function generateCandleData(count = 100) {
            const data = [];
            let price = currentPrice;
            const now = new Date();

            for (let i = count; i > 0; i--) {
                const time = new Date(now.getTime() - i * 3000);
                const open = price;
                const change = (Math.random() - 0.5) * 0.002;
                const close = parseFloat((price + change).toFixed(4));
                const high = Math.max(open, close) + (Math.random() * 0.001);
                const low = Math.min(open, close) - (Math.random() * 0.001);

                data.push({
                    time: Math.floor(time.getTime() / 1000),
                    open: open,
                    high: high,
                    low: low,
                    close: close
                });
                price = close;
            }
            currentPrice = price;
            return data;
        }

        // ============ LIVE CHART UPDATE ============
        function updateChartWithNewCandle() {
            if (!chart || !candlestickSeries) return;

            const now = Math.floor(Date.now() / 1000);
            if (now - lastCandleTime < 2) return;
            lastCandleTime = now;

            const lastCandle = chartData.length > 0 ? chartData[chartData.length - 1] : null;
            const open = lastCandle ? lastCandle.close : currentPrice;
            const change = (Math.random() - 0.5) * 0.002;
            const close = parseFloat((open + change).toFixed(4));
            const high = Math.max(open, close) + (Math.random() * 0.0015);
            const low = Math.min(open, close) - (Math.random() * 0.0015);

            const newCandle = {
                time: now,
                open: parseFloat(open.toFixed(4)),
                high: parseFloat(high.toFixed(4)),
                low: parseFloat(low.toFixed(4)),
                close: parseFloat(close.toFixed(4))
            };

            chartData.push(newCandle);
            if (chartData.length > 200) chartData.shift();

            candlestickSeries.setData(chartData);
            chart.timeScale().fitContent();
            chart.timeScale().scrollToRealTime();
        }

        // ============ TRADING SIMULATION ============
        function updateTradingAccount() {
            const marketMove = (Math.random() - 0.5) * 3.0;
            currentPrice = currentPrice * (1 + marketMove / 10000);
            currentPrice = parseFloat(currentPrice.toFixed(4));

            updateChartWithNewCandle();

            const priceDisplay = document.getElementById('currentPriceDisplay');
            const changeDisplay = document.getElementById('priceChangeDisplay');
            if (priceDisplay) {
                priceDisplay.textContent = currentPrice;
                priceDisplay.className =
                    `text-base md:text-lg ml-2 ${currentPrice > 1.0874 ? 'text-green-400' : 'text-red-400'}`;
            }
            if (changeDisplay) {
                const changePercent = ((currentPrice - 1.0874) / 1.0874 * 100).toFixed(2);
                changeDisplay.textContent = `${currentPrice > 1.0874 ? '▲' : '▼'} ${changePercent}%`;
                changeDisplay.className =
                `text-xs ml-2 ${currentPrice > 1.0874 ? 'text-green-400' : 'text-red-400'}`;
            }

            let totalPositionsProfit = 0;
            accountData.positions.forEach(pos => {
                const priceDiff = pos.type === 'buy' ? currentPrice - pos.entry : pos.entry - currentPrice;
                pos.profit = parseFloat((priceDiff * pos.amount * 1000).toFixed(2));
                pos.currentPrice = currentPrice;
                totalPositionsProfit += pos.profit;
            });

            const oldEquity = accountData.equity;
            accountData.equity = parseFloat((accountData.balance + totalPositionsProfit).toFixed(2));
            accountData.profit = parseFloat((accountData.equity - accountData.balance).toFixed(2));

            if (accountData.equity > accountData.peakEquity) {
                accountData.peakEquity = accountData.equity;
            }
            if (accountData.peakEquity > 0) {
                accountData.drawdown = parseFloat(((accountData.peakEquity - accountData.equity) / accountData
                .peakEquity * 100).toFixed(2));
            }

            const profitTarget = accountData.balance * 0.08;
            if (accountData.profit >= profitTarget && accountData.balance > 0) {
                const payoutAmount = Math.round(accountData.profit * 0.8);
                if (payoutAmount > 0) {
                    autoPayout(payoutAmount);
                    accountData.balance = accountData.balance + (accountData.profit * 0.2);
                    accountData.profit = 0;
                    accountData.equity = accountData.balance;
                    accountData.peakEquity = accountData.balance;
                }
            }

            updateDashboardDisplay();
            saveAccountData();
        }

        // ============ AUTO PAYOUT WITH NOTIFICATION ============
        async function autoPayout(amount) {
            try {
                const payoutData = {
                    amount: amount,
                    date: new Date().toISOString().split('T')[0],
                    status: 'Completed',
                    transactionId: 'PAY-' + Date.now().toString().slice(-8),
                    description: 'Trading profit payout (8% target reached)'
                };

                await apiCall('/payouts', {
                    method: 'POST',
                    body: JSON.stringify(payoutData)
                });
                accountData.totalPayouts += amount;

                // Show beautiful payout notification
                showPayoutNotification(payoutData);

                // Also show regular notification
                showNotification(
                    `🎉 Payout of $${amount.toLocaleString()} processed! Transaction: ${payoutData.transactionId}`);
            } catch (error) { console.error('Payout error:', error); }
        }

        // ============ PAYOUT NOTIFICATION ============
        function showPayoutNotification(payout) {
            const notification = document.createElement('div');
            notification.className =
                'fixed top-20 right-4 glass p-4 md:p-5 rounded-xl border border-green-500/30 z-50 max-w-xs md:max-w-sm notification-slide';
            notification.innerHTML = `
                    <div class="flex items-start space-x-3">
                        <div class="bg-green-500/20 p-2 rounded-full">
                            <i class="fas fa-check-circle text-green-400 text-xl"></i>
                        </div>
                        <div>
                            <h4 class="text-white font-bold text-sm">💰 Payout Processed!</h4>
                            <p class="text-green-400 text-sm font-bold">$${payout.amount.toLocaleString()}</p>
                            <p class="text-gray-400 text-xs">Transaction: ${payout.transactionId}</p>
                            <p class="text-gray-500 text-xs mt-1">${payout.description}</p>
                            <div class="flex items-center space-x-2 mt-1">
                                <span class="payout-badge completed">Completed</span>
                                <span class="text-gray-500 text-xs">${payout.date}</span>
                            </div>
                        </div>
                    </div>
                `;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s';
                setTimeout(() => notification.remove(), 7000);
            }, 7000);
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className =
                'fixed top-20 right-4 glass p-3 md:p-4 rounded-xl border border-cyan-500/30 z-50 max-w-xs md:max-w-sm notification-slide';
            notification.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-bell text-cyan-400 text-lg md:text-xl"></i>
                        <span class="text-white text-xs md:text-sm">${message}</span>
                    </div>
                `;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s';
                setTimeout(() => notification.remove(), 5000);
            }, 5000);
        }

        function updateDashboardDisplay() {
            const balanceEl = document.getElementById('dashboardBalance');
            const equityEl = document.getElementById('dashboardEquity');
            const drawdownEl = document.getElementById('dashboardDrawdown');
            const profitEl = document.getElementById('dashboardProfit');
            const profitTargetEl = document.getElementById('profitTargetProgress');
            const winRateEl = document.getElementById('winRate');
            const positionsEl = document.getElementById('openPositions');

            if (balanceEl) balanceEl.textContent = `$${accountData.balance.toLocaleString()}`;
            if (equityEl) {
                equityEl.textContent = `$${accountData.equity.toLocaleString()}`;
                const color = accountData.equity >= accountData.balance ? 'text-green-400' : 'text-red-400';
                equityEl.className = `text-xl md:text-2xl font-bold ${color} number-update`;
            }
            if (drawdownEl) {
                drawdownEl.textContent = `${accountData.drawdown}%`;
                const color = accountData.drawdown > 5 ? 'text-red-400' : 'text-cyan-400';

        function placeTrade(type) {
            if (!currentUser) {
                alert('Please login first');
                return;
            }

            const amount = parseFloat(document.getElementById('tradeAmount')?.value || 100);
            if (amount <= 0 || amount > accountData.balance) {
                alert('Invalid trade amount');
                return;
            }

            const trade = {
                id: Date.now().toString(),
                type: type,
                amount: amount,
                entry: currentPrice,
                profit: 0,
                currentPrice: currentPrice,
                timestamp: new Date().toISOString(),
                status: 'open'
            };

            accountData.positions.push(trade);
            accountData.totalTrades++;

            // Save to backend
            saveTradeToBackend(trade);

            showNotification(`📊 ${type.toUpperCase()} ${amount} @ ${currentPrice}`);
            updateDashboardDisplay();
            saveAccountData();
        }

        async function saveTradeToBackend(trade) {
            try {
                await apiCall('/trades', {
                    method: 'POST',
                    body: JSON.stringify(trade)
                });
                console.log('✅ Trade saved to backend');
            } catch (error) {
                console.error('❌ Error saving trade:', error);
            }
        }

        async function closePosition(id) {
            const pos = accountData.positions.find(p => p.id === id);
            if (!pos) return;

            const profit = pos.profit;
            const oldBalance = accountData.balance;
            accountData.balance = parseFloat((accountData.balance + profit).toFixed(2));
            accountData.equity = accountData.balance;
            accountData.profit = parseFloat((accountData.equity - accountData.balance).toFixed(2));
            if (profit > 0) accountData.winningTrades++;

            // Update trade in backend
            try {
                await apiCall(`/trades/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        exit: currentPrice,
                        profit: profit,
                        status: 'closed'
                    })
                });
                console.log('✅ Trade closed in backend');
            } catch (error) {
                console.error('❌ Error closing trade:', error);
            }

            accountData.positions = accountData.positions.filter(p => p.id !== id);
            showNotification(`✅ Position closed! ${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}`);
            updateDashboardDisplay();
            saveAccountData();

            // Update leaderboard
            updateLeaderboard();
        }

        function initChart() {
            const container = document.getElementById('chart-container');

                chart = null;

            }

            const isMobile = window.innerWidth < 768;
            const chartHeight = isMobile ? 200 : 350;

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth || 600,
                height: chartHeight,
                layout: {
                    background: { color: '#0b1120' },
                    textColor: '#6b7280',
                },
                grid: {
                    vertLines: { color: '#1a2332' },
                    horzLines: { color: '#1a2332' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#1a2332',
                },
                timeScale: {
                    borderColor: '#1a2332',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#22c55e',
                downColor: '#ef4444',
                borderVisible: false,
                wickUpColor: '#22c55e',
                wickDownColor: '#ef4444',
            });

            if (chartData.length > 0) {
                candlestickSeries.setData(chartData);
                chart.timeScale().fitContent();
                chart.timeScale().scrollToRealTime();
            }

            const resizeHandler = () => {
                if (chart) {
                    const newHeight = window.innerWidth < 768 ? 200 : 350;
                    chart.resize(container.clientWidth, newHeight);
                }
            };
            window.removeEventListener('resize', resizeHandler);
            window.addEventListener('resize', resizeHandler);
        }

                                            <span class="text-gray-500 text-[10px]">${statusIcon}</span>
                                        </div>
                                        <div class="flex items-center space-x-3">
                                            <span class="${profitColor} font-bold">$${l.profit.toLocaleString()}</span>
                                            ${!isYou && !isFake ? `<button onclick="fundUser('${l.userId}')" class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded hover:bg-green-500/30 transition">💲Fund</button>` : ''}
                                            ${l.profit > 20000 ? '<span class="text-xs text-yellow-400">🔥</span>' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('') : '<p class="text-gray-500 mt-4 text-sm text-center">No traders yet</p>'}
                            
                            <div class="mt-4 text-center text-gray-500 text-xs">
                                🟢 Active Trader | 🔵 You | 🔵 Real User | 💲 Fund others to help them climb!
                            </div>
                        </div>
                    `;
            } catch (error) {
                return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-red-400 text-sm md:text-base">Error loading leaderboard</div>`;
            }
        }

        // ============ FUND USER FUNCTION ============
        async function fundUser(userId) {
            if (!currentUser) {
                alert('Please login first');
                return;
            }

            const amount = prompt('Enter amount to fund (max $10,000):');
            if (!amount) return;

            const numAmount = parseFloat(amount);
            if (isNaN(numAmount) || numAmount <= 0 || numAmount > 10000) {
                alert('Please enter a valid amount between $1 and $10,000');
                return;
            }

            try {
                const result = await apiCall('/fund', {
                    method: 'POST',
                    body: JSON.stringify({
                        userId: userId,
                        amount: numAmount,
                        fromUser: currentUser.username
                    })
                });

                if (result.success) {
                    showNotification(`💲 You funded ${result.username} with $${numAmount.toLocaleString()}!`);
                    navigate('leaderboard');
                } else {
                    alert(result.message || 'Funding failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function renderChallenges() {
            if (!currentUser) {
                return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-gray-300 text-sm md:text-base">Please <a href="javascript:void(0)" onclick="navigate('login')" class="text-cyan-400 underline">login</a> to start challenges</div>`;
            }
            return `
                    <div class="glass p-4 md:p-6 rounded-xl">
                        <h3 class="text-white font-bold text-lg md:text-xl">📊 Challenges</h3>
                        <p class="text-gray-400 text-xs md:text-sm mt-1">Choose your challenge level. Target: 8% profit for auto-payout!</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4 mt-3 md:mt-4">
                            ${['10000','25000','50000','100000'].map(c => `
                                <div class="glass p-3 md:p-6 rounded-xl text-center card-hover">
                                    <h3 class="text-lg md:text-2xl font-bold text-cyan-400">$${parseInt(c).toLocaleString()}</h3>
                                    <p class="text-gray-400 text-xs md:text-sm">Target 8%</p>
                                    <p class="text-gray-500 text-xs mt-1">Payout $${(parseInt(c) * 0.08).toLocaleString()}</p>
                                    <button onclick="startChallenge('${c}')" class="mt-2 md:mt-4 bg-cyan-600/30 text-cyan-300 px-3 md:px-4 py-1 md:py-2 rounded-lg border border-cyan-500/40 hover:bg-cyan-600/50 transition text-xs md:text-sm">
                                        Start
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
        }

        async function renderPayouts() {
            if (!currentUser) return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-gray-300 text-sm md:text-base">Please login</div>`;
            try {
                const payouts = await apiCall('/payouts');
                return `
                        <div class="glass p-4 md:p-6 rounded-xl">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-white font-bold text-lg md:text-xl">💰 Payout History</h3>
                                <div class="flex items-center space-x-2">
                                    <span class="text-gray-400 text-xs">Total: </span>
                                    <span class="text-cyan-400 font-bold text-sm">$${accountData.totalPayouts.toLocaleString()}</span>
                                </div>
                            </div>
                            <p class="text-gray-400 text-xs md:text-sm mb-4">Auto-payouts are processed when you reach 8% profit!</p>
                            ${payouts && payouts.length ? payouts.map(p => `
                                <div class="payout-item">
                                    <div class="flex items-center space-x-3">
                                        <div class="bg-${p.status === 'Completed' ? 'green' : 'yellow'}-500/10 p-2 rounded-full">
                                            <i class="fas fa-${p.status === 'Completed' ? 'check-circle' : 'clock'} text-${p.status === 'Completed' ? 'green' : 'yellow'}-400"></i>
                                        </div>
                                        <div>
                                            <p class="text-white font-bold text-sm">$${p.amount.toLocaleString()}</p>
                                            <p class="text-gray-500 text-xs">${p.date || 'N/A'}</p>
                                            ${p.transactionId ? `<p class="text-gray-500 text-xs">TX: ${p.transactionId}</p>` : ''}
                                        </div>
                                    </div>
                                    <span class="payout-badge ${p.status ? p.status.toLowerCase() : 'pending'}">${p.status || 'Pending'}</span>
                                </div>
                            `).join('') : '<p class="text-gray-500 text-sm text-center py-8">No payouts yet. Start a challenge and reach 8% profit!</p>'}
                        </div>
                    `;
            } catch (error) {
                return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-red-400 text-sm md:text-base">Error loading payouts</div>`;
            }
        }

        async function renderJournal() {
            if (!currentUser) return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-gray-300 text-sm md:text-base">Please login</div>`;
            try {
                const journal = await apiCall('/journal');
                return `
                        <div class="glass p-4 md:p-6 rounded-xl">
                            <h3 class="text-white font-bold text-lg md:text-xl">📓 Trading Journal</h3>
                            ${journal.length ? journal.map(j => `
                                <div class="border-b border-cyan-500/10 py-2 text-gray-300 text-xs md:text-sm">
                                    <span class="text-cyan-400">${j.date}</span> - ${j.entry} 
                                    <span class="text-${j.outcome.includes('+') ? 'green' : 'yellow'}-400">${j.outcome}</span>
                                </div>
                            `).join('') : '<p class="text-gray-500 mt-4 text-sm">No journal entries</p>'}
                            <button onclick="addJournalEntry()" class="mt-3 md:mt-4 bg-cyan-600/20 text-cyan-300 px-3 md:px-4 py-1 md:py-2 rounded-lg border border-cyan-500/30 text-xs md:text-sm">
                                + Add Entry
                            </button>
                        </div>
                    `;
            } catch (error) {
                return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-red-400 text-sm md:text-base">Error loading journal</div>`;
            }
        }

        async function renderCertificates() {
            if (!currentUser) return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-gray-300 text-sm md:text-base">Please login</div>`;
            try {
                const certs = await apiCall('/certificates');
                return `
                        <div class="glass p-4 md:p-6 rounded-xl">
                            <h3 class="text-white font-bold text-lg md:text-xl">📜 Certificates</h3>
                            <p class="text-gray-400 text-xs md:text-sm mt-1">Earn certificates by completing challenges!</p>
                            ${certs.length ? certs.map(c => `
                                <div class="border-b border-cyan-500/10 py-2 text-gray-300 text-xs md:text-sm">
                                    <i class="fas fa-certificate text-cyan-400 mr-2"></i>${c.name}
                                </div>
                            `).join('') : '<p class="text-gray-500 mt-4 text-sm">No certificates yet. Complete a challenge to earn one!</p>'}
                        </div>
                    `;
            } catch (error) {
                return `<div class="glass p-6 md:p-8 rounded-2xl text-center text-red-400 text-sm md:text-base">Error loading certificates</div>`;
            }
        }

        function renderContact() {
            return `
                    <div class="glass p-4 md:p-6 rounded-xl max-w-xl mx-auto">
                        <h3 class="text-white font-bold text-lg md:text-xl">📞 Contact</h3>
                        <div class="text-gray-300 mt-3 md:mt-4 space-y-2 text-sm md:text-base">
                            <p><i class="fas fa-phone text-cyan-400 w-6"></i> 0741 748 180</p>
                            <p><i class="fas fa-map-pin text-cyan-400 w-6"></i> Nairobi, Kenya</p>
                            <p><i class="fas fa-envelope text-cyan-400 w-6"></i> support@synth-edge.com</p>
                        </div>
                    </div>
                `;
        }

        function renderLogin() {
            const savedUsername = localStorage.getItem('savedUsername') || '';
            const rememberMe = localStorage.getItem('rememberMe') === 'true';
            return `
                    <div class="glass p-4 md:p-6 rounded-xl max-w-md mx-auto">
                        <h3 class="text-white font-bold text-lg md:text-xl">🔐 Login</h3>
                        <form id="loginForm" class="mt-3 md:mt-4 space-y-3 md:space-y-4">
                            <div>
                                <input type="text" id="loginUser" placeholder="Username" value="${savedUsername}" class="text-sm md:text-base">
                            </div>
                            <div class="password-wrapper">
                                <input type="password" id="loginPass" placeholder="Password" class="text-sm md:text-base">
                                <button type="button" class="password-toggle" onclick="togglePassword()">
                                    <i class="fas fa-eye" id="passwordIcon"></i>
                                </button>
                            </div>
                            <div class="flex flex-wrap items-center justify-between gap-2">
                                <div class="flex items-center space-x-2">
                                    <input type="checkbox" id="rememberMe" class="custom-checkbox" ${rememberMe ? 'checked' : ''}>
                                    <label for="rememberMe" class="text-gray-300 text-xs md:text-sm">Remember Me</label>
                                </div>
                                <a href="javascript:void(0)" class="text-cyan-400 text-xs md:text-sm hover:text-cyan-300">Forgot Password?</a>
                            </div>
                            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-2 md:py-3 rounded-lg font-medium transition text-sm md:text-base">Login</button>
                        </form>
                        <p class="text-gray-400 text-xs md:text-sm mt-3 md:mt-4 text-center">Don't have an account? <a href="javascript:void(0)" onclick="navigate('register')" class="text-cyan-400 hover:text-cyan-300">Register</a></p>
                    </div>
                `;
        }

        function renderRegister() {
            return `
                    <div class="glass p-4 md:p-6 rounded-xl max-w-md mx-auto">
                        <h3 class="text-white font-bold text-lg md:text-xl">📝 Register</h3>
                        <form id="registerForm" class="mt-3 md:mt-4 space-y-3 md:space-y-4">
                            <input type="text" id="regUser" placeholder="Username" class="text-sm md:text-base">
                            <input type="email" id="regEmail" placeholder="Email" class="text-sm md:text-base">
                            <div class="password-wrapper">
                                <input type="password" id="regPass" placeholder="Password" class="text-sm md:text-base">
                                <button type="button" class="password-toggle" onclick="toggleRegisterPassword()">
                                    <i class="fas fa-eye" id="registerPasswordIcon"></i>
                                </button>
                            </div>
                            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-2 md:py-3 rounded-lg font-medium transition text-sm md:text-base">Register</button>
                        </form>
                        <p class="text-gray-400 text-xs md:text-sm mt-3 md:mt-4 text-center">Already have an account? <a href="javascript:void(0)" onclick="navigate('login')" class="text-cyan-400 hover:text-cyan-300">Login</a></p>
                    </div>
                `;
        }

        // ============ PASSWORD TOGGLE ============
        function togglePassword() {
            const passInput = document.getElementById('loginPass');
            const icon = document.getElementById('passwordIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function toggleRegisterPassword() {
            const passInput = document.getElementById('regPass');
            const icon = document.getElementById('registerPasswordIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ============ NAVIGATION ============
        async function navigate(page) {
            console.log('Navigating to:', page);
            const content = document.getElementById('page-content');

            if (page !== 'dashboard' && page !== 'trading' && tradingInterval) {
                clearInterval(tradingInterval);
                tradingInterval = null;
            }

            switch (page) {
                case 'home':
                    content.innerHTML = await renderHome();
                    break;
                case 'dashboard':
                    content.innerHTML = await renderDashboard();
                    break;
                case 'trading':
                    content.innerHTML = await renderTrading();
                    break;
                case 'challenges':
                    content.innerHTML = await renderChallenges();
                    break;
                case 'payouts':
                    content.innerHTML = await renderPayouts();
                    break;
                case 'leaderboard':
                    content.innerHTML = await renderLeaderboard();
                    break;
                case 'journal':
                    content.innerHTML = await renderJournal();
                    break;
                case 'certificates':
                    content.innerHTML = await renderCertificates();
                    break;
                case 'contact':
                    content.innerHTML = renderContact();
                    break;
                case 'login':
                    content.innerHTML = renderLogin();
                    break;
                case 'register':
                    content.innerHTML = renderRegister();
                    break;
                default:
                    content.innerHTML = await renderHome();
            }

            attachFormListeners();
            updateHomeMarket();
        }

        function updateHomeMarket() {
            const homeItems = document.querySelectorAll('.home-market-item');
            homeItems.forEach(item => {
                const pair = item.getAttribute('data-home-pair');
                const data = marketData.find(d => {
                    if (pair === 'BTC') return d.pair === 'BTC/USD';
                    if (pair === 'ETH') return d.pair === 'ETH/USD';
                    return d.pair === pair;
                });
                if (data) {
                    const direction = data.change >= 0 ? 'up' : 'down';
                    const color = direction === 'up' ? 'text-green-400' : 'text-red-400';
                    const icon = direction === 'up' ? 'fa-arrow-up' : 'fa-arrow-down';
                    item.innerHTML = `
                            <span class="${color}">${pair}</span>
                            ${data.price.toLocaleString()} 
                            <i class="fas ${icon} ${color}"></i>
                        `;
                }
            });
        }

        function attachFormListeners() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.removeEventListener('submit', handleLogin);
                loginForm.addEventListener('submit', handleLogin);
            }
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.removeEventListener('submit', handleRegister);
                registerForm.addEventListener('submit', handleRegister);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                alert('Please fill in all fields');
                return;
            }

            if (rememberMe) {
                localStorage.setItem('savedUsername', username);
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('savedUsername');
                localStorage.setItem('rememberMe', 'false');
            }

            await loginUser(username, password);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;

            if (!username || !email || !password) {
                alert('Please fill in all fields');
                return;
            }
            await registerUser(username, email, password);
        }

        // ============ CHALLENGE FUNCTIONS ============
        window.startChallenge = async function(amount) {
            if (!currentUser) {
                alert('Please login first');
                return;
            }
            try {
                const result = await apiCall('/challenge/start', {
                    method: 'POST',
                    body: JSON.stringify({ amount })
                });
                accountData.balance = parseFloat(amount);
                accountData.equity = accountData.balance;
                accountData.profit = 0;
                accountData.drawdown = 0;
                accountData.peakEquity = accountData.balance;
                accountData.totalTrades = 0;
                accountData.winningTrades = 0;
                accountData.totalPayouts = 0;
                accountData.positions = [];
                accountData.tradeHistory = [];
                showNotification(`🚀 Challenge $${parseInt(amount).toLocaleString()} started!`);
                alert(result.message);
                navigate('dashboard');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.addJournalEntry = async function() {
            if (!currentUser) {
                alert('Please login first');
                return;
            }
            try {
                const entry = prompt('Enter journal entry:');
                if (entry) {
                    await apiCall('/journal', {
                        method: 'POST',
                        body: JSON.stringify({ entry, outcome: 'pending' })
                    });
                    navigate('journal');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        // Make functions global
        window.navigate = navigate;
        window.logoutUser = logoutUser;
        window.togglePassword = togglePassword;
        window.toggleRegisterPassword = toggleRegisterPassword;
        window.placeTrade = placeTrade;
        window.closePosition = closePosition;
        window.fundUser = fundUser;

        // ============ INIT ============
        console.log('SynthEdge Loading...');
        checkAuth();
        navigate('home');
        console.log('SynthEdge Ready!');

        renderTicker();

        setInterval(() => {
            updateHomeMarket();
            const tickerItems = document.querySelectorAll('[data-pair]');
            tickerItems.forEach(el => {
                const pair = el.getAttribute('data-pair');
                const data = marketData.find(d => d.pair === pair);
                if (data) {
                    const direction = data.change >= 0 ? 'up' : 'down';
                    const color = direction === 'up' ? 'text-green-400' : 'text-red-400';
                    const icon = direction === 'up' ? 'fa-arrow-up' : 'fa-arrow-down';
                    el.innerHTML = `
                            <span class="${color}">${data.pair}</span>
                            ${data.price.toLocaleString()} 
                            <i class="fas ${icon} ${color} ml-1"></i>
                        `;
                }
            });
        }, 3000);
    </script>
</body>
</html>
